name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Go tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arena
          POSTGRES_PASSWORD: arena
          POSTGRES_DB: arena_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arena -d arena_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ARENA_TEST_DATABASE_URL: postgres://arena:arena@localhost:5432/arena_test?sslmode=disable
      ARENA_TEST_REDIS_ADDR: localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go-arena/go.mod
          cache-dependency-path: go-arena/go.sum
      - name: Test backend
        working-directory: go-arena
        run: go test ./...
      - name: Race detector
        working-directory: go-arena
        run: go test -race ./...

  frontend-and-sdks:
    name: Syntax and SDK checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SDK test dependencies
        run: |
          npm ci --prefix sdk/nodejs --ignore-scripts
          python -m pip install --disable-pip-version-check -e "sdk/python[dev]"
      - name: Validate JSON manifests
        shell: bash
        run: |
          node -e "JSON.parse(require('fs').readFileSync('sdk/nodejs/package.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('sdk/nodejs/package-lock.json', 'utf8'))"
      - name: Check JavaScript syntax
        shell: bash
        run: |
          git ls-files 'frontend/**/*.js' 'sdk/nodejs/**/*.js' | xargs -r -n 1 node --check
          node scripts/check-admin-inline-js.mjs
          node scripts/test-admin-sse-parser.mjs
          node scripts/test-admin-sse-reconnect.mjs
          node scripts/test-admin-connection-diagnostics.mjs
          node scripts/test-dashboard-startup.mjs
          node scripts/test-dashboard-account-cosmetics.mjs
          node scripts/test-dashboard-cosmetics-preview.mjs
          node scripts/test-dashboard-email-auth.mjs
          node scripts/test-dashboard-cosmetics-checkout.mjs
          node scripts/test-embedded-stripe-checkout.mjs
          node scripts/test-cosmetic-themes.mjs
          node scripts/test-cosmetics-renderer.mjs
          node scripts/test-cosmetics-launch-ui.mjs
          node scripts/test-cosmetics-shop.mjs
          node scripts/test-cosmetics-shop-preview.mjs
          node scripts/test-cosmetics-forge-mounts.mjs
          node scripts/test-character-roster.mjs
          node scripts/test-body-form-roster.mjs
          node scripts/test-body-form-renderer.mjs
          node scripts/test-character-animations.mjs
          node scripts/test-character-renderer-integration.mjs
          node scripts/test-character-shop.mjs
          node scripts/test-forge-action-edge.mjs
          node scripts/test-forge-facing.mjs
          node scripts/test-forge-lod.mjs
          node scripts/test-forge-visibility.mjs
          node scripts/test-world-bot-hud.mjs
          node scripts/test-forge-mount-metrics.mjs
          node scripts/test-safe-zone-geometry.mjs
          node scripts/test-map-walls-geometry.mjs
          node scripts/test-obstacle-clusters.mjs
          node scripts/test-intermission-director.mjs
          node scripts/test-round-transition-rendering.mjs
          node scripts/test-renderer-suspension.mjs
          node scripts/test-engine-webgpu-fallback.mjs
          node scripts/test-rendering-safety-guardrails.mjs
          node scripts/test-spectator-startup-budget.mjs
          node scripts/test-trail-budget.mjs
          node scripts/test-cosmetic-trails.mjs
          node scripts/test-projectile-trail-texture.mjs
          node scripts/test-key-generator.mjs
          node scripts/test-admin-cosmetics-ui.mjs
          node scripts/test-admin-broadcast-ui.mjs
          node scripts/test-public-paths.mjs
          node scripts/test-spectator-client.mjs
          node scripts/test-responsive-site-shell.mjs
          node scripts/test-safe-viewport.mjs
          node scripts/test-arena-brand-lockup.mjs
          node scripts/test-teleporter-readiness.mjs
          node scripts/test-service-status-ui.mjs
          node scripts/test-chat-disabled-ui.mjs
          node scripts/test-sdk-service-status.mjs
          node --check updater/server.mjs
          node --test updater/*.test.mjs
      - name: Check Python syntax
        run: |
          python -m compileall sdk/python/arena_sdk sdk/python/examples bots
          python scripts/test_keith_bot_hints.py
          python scripts/test_sdk_service_status.py
      - name: Test SDK action helpers
        run: |
          node --test sdk/nodejs/test/*.test.js
          python -m pytest sdk/python/tests
      - name: Check whitespace
        run: git diff --check

  browser-smoke:
    name: Spectator browser smoke
    needs: frontend-and-sdks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/browser/package-lock.json
      - name: Install browser test dependencies
        run: npm ci --prefix tests/browser --ignore-scripts
      - name: Install functional Chromium runtime
        run: npm exec --prefix tests/browser -- playwright install --with-deps chromium
      - name: Run spectator browser smoke
        run: npm test --prefix tests/browser
      - name: Retain browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spectator-browser-smoke
          path: |
            tests/browser/test-results
            tests/browser/playwright-report
          if-no-files-found: warn
          retention-days: 14

  python-sdk-310:
    name: Python SDK (3.10 compatibility)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install SDK test dependencies
        run: python -m pip install --disable-pip-version-check -e "sdk/python[dev]"
      - name: Check SDK compatibility
        run: |
          python -m compileall sdk/python/arena_sdk sdk/python/examples
          python scripts/test_sdk_service_status.py
          python -m pytest sdk/python/tests
