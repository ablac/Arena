# Pin the Compose project name so every `docker compose` invocation resolves to
# the same project regardless of the directory it runs from. The self-update
# sidecar (arena-updater) runs compose from the deploy dir mounted at its own
# path; without a pinned name, compose would derive the project from the cwd
# basename and could recreate arena-server in a different project (wrong
# network, unable to reach arena-db/arena-redis). See docs/build-and-deploy.md.
name: arena

services:
  arena-db:
    image: postgres:16-alpine
    container_name: arena-db
    environment:
      POSTGRES_DB: ${ARENA_DB_NAME:-arena}
      POSTGRES_USER: ${ARENA_DB_USER:-arena_user}
      POSTGRES_PASSWORD: ${ARENA_DB_PASSWORD:-changeme_arena_2026}
    ports:
      - "127.0.0.1:${ARENA_DB_HOST_PORT:-5433}:5432"
    volumes:
      - arena_pgdata:/var/lib/postgresql/data
    networks:
      arena_net:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ARENA_DB_USER:-arena_user} -d ${ARENA_DB_NAME:-arena}"]
      interval: 5s
      timeout: 5s
      retries: 5

  arena-redis:
    image: redis:7-alpine
    container_name: arena-redis
    ports:
      - "127.0.0.1:${ARENA_REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - arena_redis_data:/data
    networks:
      arena_net:
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  arena-server:
    build:
      context: .
      dockerfile: go-arena/Dockerfile
      args:
        # Set by the deploy step: GIT_COMMIT=$(git rev-parse HEAD)
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: arena-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8700:8000"
    depends_on:
      arena-db:
        condition: service_healthy
      arena-redis:
        condition: service_healthy
    env_file:
      - .env
    networks:
      arena_net:

  # Self-update sidecar. Holds Docker-socket (host-root-equivalent) access so
  # arena-server itself never needs it. Reachable only from other containers on
  # arena_net by service name (no `ports:` mapping -- never bound to the host or
  # tailnet), and gated behind the "updater" profile so a normal `docker compose
  # up -d` never creates it. Enabling it requires `--profile updater` plus an
  # ARENA_UPDATER_SHARED_SECRET. It fetches the target commit's tarball from the
  # PUBLIC Arena repo (no token needed), rsyncs the source into the deploy dir,
  # then rebuilds and recreates arena-server. See docs/build-and-deploy.md.
  arena-updater:
    build:
      context: ./updater
    image: arena-updater:local
    container_name: arena-updater
    restart: unless-stopped
    profiles:
      - updater
    environment:
      UPDATER_SHARED_SECRET: ${ARENA_UPDATER_SHARED_SECRET:-}
      # Deploy dir mounted at its OWN host path (see volumes) so compose's
      # relative build context resolves identically inside the sidecar and for
      # the daemon. ${PWD} is the deploy dir (compose is always run from there).
      DEPLOY_DIR: ${PWD}
      # uid:gid the post-sync ownership restore chowns code back to (e.g.
      # 1000:1001). Unset = fall back to the dir's own owner, skipping if root.
      DEPLOY_OWNER: ${DEPLOY_OWNER:-}
      COMPOSE_FILES: "docker-compose.yml"
      COMPOSE_SERVICE: arena-server
      GITHUB_OWNER: ablac
      GITHUB_REPO: Arena
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}:${PWD}
    networks:
      arena_net:

volumes:
  arena_pgdata:
  arena_redis_data:

networks:
  arena_net:
    driver: bridge
    internal: false
